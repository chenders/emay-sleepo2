<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 300" width="900" height="300"
     role="img" aria-labelledby="im-title im-desc" font-family="ui-monospace, 'SF Mono', Menlo, monospace">
  <title id="im-title">The investigation trail — twelve steps, two wrong turns</title>
  <desc id="im-desc">A winding trail from first scan to breakthrough, with two dead-end side-paths marking the wrong checksum-mask guess and the reversed start/stop hypothesis, both looping back onto the main trail.</desc>
  <defs>
    <linearGradient id="im-bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0c1219"/><stop offset="1" stop-color="#090d12"/>
    </linearGradient>
    <style>
      .pulse{animation:impulse 2.4s ease-in-out infinite}
      @keyframes impulse{0%,100%{opacity:.55}50%{opacity:1}}
      .glow{animation:imglow 2.4s ease-in-out infinite}
      @keyframes imglow{0%,100%{r:7}50%{r:10}}
      .walker{offset-path:path('M50,190 Q120,140 190,168 Q260,196 330,150 Q400,104 470,168 Q540,232 610,150 Q680,68 750,150 Q790,196 840,150');animation:imwalk 8s linear infinite}
      @keyframes imwalk{from{offset-distance:0%}to{offset-distance:100%}}
      @media (prefers-reduced-motion:reduce){svg *{animation-play-state:paused!important}}
    </style>
  </defs>

  <rect width="900" height="300" rx="18" fill="url(#im-bg)"/>
  <rect x="1" y="1" width="898" height="298" rx="17" fill="none" stroke="#1a2530" stroke-width="1"/>

  <!-- main resolved trail -->
  <path d="M50,190 Q120,140 190,168 Q260,196 330,150 Q400,104 470,168 Q540,232 610,150 Q680,68 750,150 Q790,196 840,150"
        fill="none" stroke="#2ee6c8" stroke-width="3" stroke-linecap="round" opacity=".85"/>

  <!-- dead-end spur: step 5, wrong checksum mask -->
  <path d="M330,150 Q345,90 300,68" fill="none" stroke="#ff5c6c" stroke-width="2.5" stroke-dasharray="5 6" stroke-linecap="round"/>
  <text x="292" y="58" font-size="11" fill="#ff8a95" text-anchor="middle">0xFF mask</text>
  <text x="292" y="72" font-size="11" fill="#ff8a95" text-anchor="middle">✕ wrong</text>

  <!-- dead-end spur: step 7, reversed start/stop -->
  <path d="M610,150 Q630,230 585,258" fill="none" stroke="#ff5c6c" stroke-width="2.5" stroke-dasharray="5 6" stroke-linecap="round"/>
  <text x="575" y="272" font-size="11" fill="#ff8a95" text-anchor="middle">start/stop</text>
  <text x="575" y="286" font-size="11" fill="#ff8a95" text-anchor="middle">✕ reversed</text>

  <!-- traveling position marker -->
  <circle r="5" fill="#ffcf5c" class="walker"/>

  <!-- step stations -->
  <g font-size="10.5" fill="#c9d3db" text-anchor="middle">
    <circle cx="50" cy="190" r="6" fill="#12202b" stroke="#2ee6c8" stroke-width="2"/>
    <text x="50" y="216">1 · scan</text>

    <circle cx="190" cy="168" r="6" fill="#12202b" stroke="#2ee6c8" stroke-width="2"/>
    <text x="190" y="140">2 · silent</text>

    <circle cx="330" cy="150" r="6" fill="#12202b" stroke="#2ee6c8" stroke-width="2"/>
    <rect x="272" y="164" width="116" height="16" rx="4" fill="#0a0f14"/>
    <text x="330" y="176">4/5 · decompile</text>

    <circle cx="470" cy="168" r="6" fill="#12202b" stroke="#2ee6c8" stroke-width="2"/>
    <text x="470" y="140">6 · still silent</text>

    <circle cx="610" cy="150" r="6" fill="#12202b" stroke="#2ee6c8" stroke-width="2"/>
    <rect x="558" y="164" width="104" height="16" rx="4" fill="#0a0f14"/>
    <text x="610" y="176">7/8 · capture</text>

    <circle class="glow pulse" cx="750" cy="150" r="7" fill="#0e1b24" stroke="#ffcf5c" stroke-width="2.5"/>
    <rect x="688" y="110" width="124" height="16" rx="4" fill="#0a0f14"/>
    <text x="750" y="122" font-weight="700" fill="#ffcf5c">9 · BREAKTHROUGH</text>

    <circle cx="840" cy="150" r="6" fill="#12202b" stroke="#57d68d" stroke-width="2"/>
    <text x="840" y="176" fill="#57d68d">12 · shipped</text>
  </g>

  <text x="450" y="26" text-anchor="middle" font-size="13" fill="#8798a6">two wrong turns, one breakthrough — the full story is in the numbered steps below</text>
</svg>
