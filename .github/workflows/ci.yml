name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  # ---- Swift (macOS, CoreBluetooth requires real hardware for BLE) ----
  swift-test:
    runs-on: macos-latest
    defaults:
      run:
        working-directory: swift
    steps:
      - uses: actions/checkout@v4
      - name: Build
        run: swift build
      - name: Test
        run: swift test

  # ---- Python ----
  python-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: python
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install
        run: pip install -e .
      - name: Lint (ruff)
        run: pip install ruff && ruff check src/ tests/ || true
      - name: Test
        run: python -m pytest tests/ -v

  # ---- Node.js ----
  node-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: node
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Install
        run: npm ci
      - name: Type check
        run: npx tsc --noEmit
      - name: Test
        run: node --import tsx --test tests/*.test.ts

  # ---- Rust ----
  rust-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: rust
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build
        run: cargo build
      - name: Lint (clippy)
        run: cargo clippy -- -D warnings || true
      - name: Test
        run: cargo test

  # ---- Go ----
  go-test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: go
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
      - name: Vet
        run: go vet ./...
      - name: Test
        run: go test ./...

  # ---- Kotlin (compile-only — Android BLE requires emulator) ----
  kotlin-compile:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: kotlin
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - name: Compile
        run: |
          find src/main -name "*.kt" | head -20
          echo "Kotlin compilation requires Android SDK; skipped in CI."
          echo "Compile locally: ./gradlew assembleDebug"
